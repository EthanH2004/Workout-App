<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Tracker — Exercise Detail</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Archivo:wdth,wght@62..125,100..900&display=swap');
:root{
  --bg:#0A0A0B; --surface:#141416; --raised:#1E1E21; --high:#2E2E33; --overlay:#26262A;
  --border-subtle:rgba(255,255,255,0.07); --border-default:rgba(255,255,255,0.10);
  --text-primary:#FFFFFF; --text-secondary:#9A9A9D; --text-tertiary:#6A6A6D;
  --accent:#FF6A28; --accent-text:#FF8A4D; --accent-subtle:rgba(255,106,40,0.14);
  --pr:#A98BFF; --pr-subtle:rgba(169,139,255,0.15); --text-on-accent:#141210;
  --r-xs:4px; --r-sm:8px; --r-md:12px; --r-lg:16px;
  --elev-1:0 6px 20px rgba(0,0,0,0.45);
  --font:'Archivo',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
body{background:#060607;font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 0;}
.exp{font-variation-settings:'wdth' 118,'wght' 800;}
.tab{font-variant-numeric:tabular-nums;}
.cap{font-size:11px;letter-spacing:0.13em;text-transform:uppercase;color:var(--text-secondary);}
.phone{position:relative;width:390px;height:844px;background:var(--bg);border-radius:48px;border:0.5px solid var(--border-subtle);overflow:hidden;box-shadow:0 30px 90px rgba(0,0,0,0.65);color:var(--text-primary);}
.screen{display:flex;flex-direction:column;height:100%;}
.content{flex:1;overflow-y:auto;padding:0 16px 28px;}
.content::-webkit-scrollbar{display:none;}
.statusbar{height:54px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 24px 7px;flex-shrink:0;}
.statusbar .t{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;}
.statusbar .ind{display:flex;align-items:center;gap:6px;}

.navbar{display:flex;align-items:center;justify-content:space-between;padding:2px 6px 8px;flex-shrink:0;}
.navbar .ttl{font-size:16px;font-weight:600;}
.iconbtn{width:38px;height:38px;display:flex;align-items:center;justify-content:center;color:#E6E6E6;background:none;border:none;cursor:pointer;}

.metric-toggle{display:flex;gap:4px;background:var(--raised);border-radius:var(--r-sm);padding:3px;margin:4px 0 14px;}
.metric-toggle span{flex:1;text-align:center;font-size:12px;font-weight:500;color:var(--text-secondary);padding:7px 0;border-radius:6px;}
.metric-toggle span.on{background:var(--high);color:#fff;}

.big{font-size:34px;}
.u{font-size:14px;color:var(--text-secondary);font-variation-settings:normal;font-weight:400;}

.range{display:flex;justify-content:space-between;margin:12px 0 18px;}
.range span{font-size:12px;color:var(--text-secondary);padding:6px 14px;border-radius:6px;font-variant-numeric:tabular-nums;}
.range span.on{background:var(--accent);color:var(--text-on-accent);}

.statcards{display:flex;gap:10px;}
.scard{flex:1;background:var(--surface);border-radius:var(--r-md);padding:12px 13px;box-shadow:var(--elev-1);}
.scard .v{font-size:18px;font-weight:600;margin-top:5px;font-variant-numeric:tabular-nums;}
.scard .v.pr{color:var(--pr);}

.seclabel{margin:24px 0 4px;}
.hrow{display:flex;align-items:center;padding:13px 4px;border-top:0.5px solid var(--border-subtle);}
.hrow .date{font-size:14px;color:#EDEDED;width:96px;font-variant-numeric:tabular-nums;}
.hrow .best{flex:1;font-size:14px;color:var(--text-secondary);font-variant-numeric:tabular-nums;}
.hrow .e1{font-size:14px;font-weight:500;font-variant-numeric:tabular-nums;}
.hrow .prdot{width:7px;height:7px;border-radius:50%;background:var(--pr);margin-left:8px;}
.home-ind{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:3px;background:rgba(255,255,255,0.22);}
</style>
</head>
<body>
<div class="phone">
  <div class="screen">

    <div class="statusbar">
      <span class="t">9:41</span>
      <span class="ind">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="#fff"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4.5" width="3" height="7.5" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
        <svg width="17" height="12" viewBox="0 0 17 12" fill="none" stroke="#fff" stroke-width="1.4" stroke-linecap="round"><path d="M1 4.2C3.2 2.3 5.7 1.3 8.5 1.3s5.3 1 7.5 2.9"/><path d="M3.4 6.9C4.8 5.7 6.6 5 8.5 5s3.7.7 5.1 1.9"/><path d="M5.9 9.6c.7-.6 1.6-1 2.6-1s1.9.4 2.6 1"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="#fff" stroke-opacity="0.45"/><rect x="2" y="2" width="16.5" height="8" rx="1.6" fill="#fff"/><rect x="23" y="4" width="1.6" height="4" rx="0.8" fill="#fff" fill-opacity="0.45"/></svg>
      </span>
    </div>

    <div class="navbar">
      <button class="iconbtn"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#E6E6E6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg></button>
      <span class="ttl">Bench press</span>
      <button class="iconbtn"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#E6E6E6" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="12" cy="19" r="1.4"/></svg></button>
    </div>

    <div class="content">

      <div class="metric-toggle">
        <span class="on">Est. 1RM</span><span>Volume</span><span>Heaviest</span>
      </div>

      <div class="cap">Estimated 1RM</div>
      <div style="display:flex;align-items:baseline;gap:10px;margin:3px 0 2px;">
        <span class="exp tab big">176<span class="u"> lb</span></span>
        <span class="tab" style="font-size:14px;color:var(--accent-text);">+26 · 90d</span>
      </div>

      <svg viewBox="0 0 358 170" width="100%" style="height:172px;display:block;margin-top:6px;">
        <defs><linearGradient id="fg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FF6A28" stop-opacity="0.30"/><stop offset="1" stop-color="#FF6A28" stop-opacity="0"/></linearGradient></defs>
        <line x1="8" y1="22" x2="358" y2="22" stroke="#FFFFFF" stroke-opacity="0.06"/>
        <line x1="8" y1="74" x2="358" y2="74" stroke="#FFFFFF" stroke-opacity="0.06"/>
        <line x1="8" y1="126" x2="358" y2="126" stroke="#FFFFFF" stroke-opacity="0.06"/>
        <text x="354" y="19" text-anchor="end" fill="#6A6A6D" font-size="9">180</text>
        <text x="354" y="71" text-anchor="end" fill="#6A6A6D" font-size="9">163</text>
        <text x="354" y="123" text-anchor="end" fill="#6A6A6D" font-size="9">146</text>
        <polygon points="10,126 60,132 108,110 156,96 204,99 252,74 300,60 348,34 348,156 10,156" fill="url(#fg)"/>
        <polyline fill="none" stroke="#FF6A28" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" points="10,126 60,132 108,110 156,96 204,99 252,74 300,60 348,34"/>
        <line x1="252" y1="22" x2="252" y2="156" stroke="#FFFFFF" stroke-opacity="0.18" stroke-dasharray="3 3"/>
        <circle cx="252" cy="74" r="4.5" fill="#fff"/><circle cx="252" cy="74" r="4.5" fill="none" stroke="#FF6A28" stroke-width="2"/>
        <rect x="224" y="2" width="56" height="18" rx="4" fill="#26262A"/><text x="252" y="14.5" text-anchor="middle" fill="#E6E6E6" font-size="10">May 14 · 168</text>
        <circle cx="348" cy="34" r="8" fill="none" stroke="#A98BFF" stroke-opacity="0.35"/><circle cx="348" cy="34" r="4.5" fill="#A98BFF"/>
      </svg>

      <div class="range">
        <span>1M</span><span class="on">3M</span><span>6M</span><span>1Y</span><span>All</span>
      </div>

      <div class="statcards">
        <div class="scard"><div class="cap">Best set</div><div class="v tab">155 × 6</div></div>
        <div class="scard"><div class="cap">Heaviest</div><div class="v tab">165 lb</div></div>
        <div class="scard"><div class="cap">PR · 1RM</div><div class="v tab pr">176 lb</div></div>
      </div>

      <div class="cap seclabel">History</div>
      <div class="hrow"><span class="date">Jun 1</span><span class="best">135 × 8 · best set</span><span class="e1 tab">169</span><span class="prdot"></span></div>
      <div class="hrow"><span class="date">May 28</span><span class="best">135 × 7</span><span class="e1 tab">166</span></div>
      <div class="hrow"><span class="date">May 24</span><span class="best">130 × 8</span><span class="e1 tab">163</span></div>
      <div class="hrow"><span class="date">May 21</span><span class="best">130 × 7</span><span class="e1 tab">160</span></div>
      <div class="hrow"><span class="date">May 14</span><span class="best">125 × 8</span><span class="e1 tab">156</span></div>

    </div>
    <div class="home-ind"></div>
  </div>
</div>
</body>
</html>
