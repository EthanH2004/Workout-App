<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Tracker — Profile</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Archivo:wdth,wght@62..125,100..900&display=swap');
:root{
  --bg:#0A0A0B; --surface:#141416; --raised:#1E1E21; --high:#2E2E33;
  --border-subtle:rgba(255,255,255,0.07); --border-default:rgba(255,255,255,0.10);
  --text-primary:#FFFFFF; --text-secondary:#9A9A9D; --text-tertiary:#6A6A6D;
  --accent:#FF6A28; --accent-text:#FF8A4D; --accent-subtle:rgba(255,106,40,0.14);
  --pr:#A98BFF; --destructive:#FF5C5C; --text-on-accent:#141210;
  --r-xs:4px; --r-sm:8px; --r-md:12px; --r-lg:16px;
  --elev-1:0 6px 20px rgba(0,0,0,0.45);
  --font:'Archivo',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
body{background:#060607;font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 0;}
.exp{font-variation-settings:'wdth' 118,'wght' 800;}
.tab{font-variant-numeric:tabular-nums;}
.cap{font-size:11px;letter-spacing:0.13em;text-transform:uppercase;color:var(--text-secondary);}
.phone{position:relative;width:390px;height:844px;background:var(--bg);border-radius:48px;border:0.5px solid var(--border-subtle);overflow:hidden;box-shadow:0 30px 90px rgba(0,0,0,0.65);color:var(--text-primary);}
.screen{display:flex;flex-direction:column;height:100%;}
.content{flex:1;overflow-y:auto;padding:0 16px 16px;}
.content::-webkit-scrollbar{display:none;}
.statusbar{height:54px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 24px 7px;flex-shrink:0;}
.statusbar .t{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;}
.statusbar .ind{display:flex;align-items:center;gap:6px;}

.navbar{display:flex;align-items:center;justify-content:space-between;padding:4px 0 8px;}
.navbar .ttl{font-size:24px;font-weight:600;}
.iconbtn{width:40px;height:40px;border-radius:var(--r-sm);background:var(--raised);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;color:#E6E6E6;}

/* identity */
.ident{display:flex;align-items:center;gap:14px;padding:8px 0 18px;}
.avatar{width:60px;height:60px;border-radius:50%;background:var(--accent-subtle);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.avatar .ini{font-size:24px;font-variation-settings:'wdth' 118,'wght' 800;color:var(--accent-text);}
.ident .nm{font-size:20px;font-weight:600;}
.ident .em{font-size:13px;color:var(--text-secondary);margin-top:2px;}

/* stats grid */
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.scard{background:var(--surface);border-radius:var(--r-md);padding:15px;box-shadow:var(--elev-1);}
.scard .v{font-size:24px;margin-top:6px;line-height:1;}
.scard .u{font-size:13px;color:var(--text-secondary);font-variation-settings:normal;font-weight:400;}

.seclabel{margin:24px 0 10px;}
.group{background:var(--surface);border-radius:var(--r-md);box-shadow:var(--elev-1);overflow:hidden;}
.row{display:flex;align-items:center;gap:13px;padding:15px 16px;border-top:0.5px solid var(--border-subtle);cursor:pointer;}
.row:first-child{border-top:none;}
.row .lab{flex:1;font-size:15px;color:#EDEDED;}
.row .val{font-size:14px;color:var(--text-secondary);}
.eq{color:var(--text-secondary);flex-shrink:0;}
.chev{color:#5A5A5D;flex-shrink:0;}

.signout{text-align:center;color:var(--destructive);font-size:15px;font-weight:500;padding:22px 0 8px;cursor:pointer;}

.tabbar{display:flex;justify-content:space-around;align-items:flex-start;height:84px;padding:11px 8px 0;border-top:0.5px solid var(--border-subtle);background:rgba(10,10,11,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);flex-shrink:0;overflow:visible;}
.tabitem{text-align:center;width:62px;}
.tabitem .tl{font-size:10px;margin-top:4px;}
.fab{width:56px;height:56px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto;box-shadow:0 8px 22px rgba(255,106,40,0.42);}
.home-ind{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:3px;background:rgba(255,255,255,0.22);}
</style>
</head>
<body>
<div class="phone">
  <div class="screen">

    <div class="statusbar">
      <span class="t">9:41</span>
      <span class="ind">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="#fff"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4.5" width="3" height="7.5" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
        <svg width="17" height="12" viewBox="0 0 17 12" fill="none" stroke="#fff" stroke-width="1.4" stroke-linecap="round"><path d="M1 4.2C3.2 2.3 5.7 1.3 8.5 1.3s5.3 1 7.5 2.9"/><path d="M3.4 6.9C4.8 5.7 6.6 5 8.5 5s3.7.7 5.1 1.9"/><path d="M5.9 9.6c.7-.6 1.6-1 2.6-1s1.9.4 2.6 1"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="#fff" stroke-opacity="0.45"/><rect x="2" y="2" width="16.5" height="8" rx="1.6" fill="#fff"/><rect x="23" y="4" width="1.6" height="4" rx="0.8" fill="#fff" fill-opacity="0.45"/></svg>
      </span>
    </div>

    <div class="content">
      <div class="navbar">
        <div class="ttl">Profile</div>
        <button class="iconbtn"><svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="#E6E6E6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 13.5a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-2.9 1.2v.2a2 2 0 1 1-4 0v-.1A1.7 1.7 0 0 0 6.3 18a1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0-1.2-2.9H.2a2 2 0 1 1 0-4h.1A1.7 1.7 0 0 0 2 6.3a1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H6.5A1.7 1.7 0 0 0 7.7 0H8a2 2 0 1 1 4 0" transform="translate(2 2) scale(0.83)"/></svg></button>
      </div>

      <!-- IDENTITY -->
      <div class="ident">
        <div class="avatar"><span class="ini">A</span></div>
        <div>
          <div class="nm">Alex Carter</div>
          <div class="em">alex.carter@gmail.com · since Jan 2026</div>
        </div>
      </div>

      <!-- LIFETIME STATS -->
      <div class="statgrid">
        <div class="scard"><div class="cap">Workouts</div><div class="exp tab v">142</div></div>
        <div class="scard"><div class="cap">Total volume</div><div class="exp tab v">2.1M<span class="u"> lb</span></div></div>
        <div class="scard"><div class="cap">Personal records</div><div class="exp tab v">38</div></div>
        <div class="scard"><div class="cap">Hours trained</div><div class="exp tab v">96</div></div>
      </div>

      <!-- LINKS -->
      <div class="cap seclabel">Account</div>
      <div class="group">
        <div class="row">
          <svg class="eq" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.5 12a7.5 7.5 0 0 0-.1-1l2-1.5-2-3.4-2.3 1a7.5 7.5 0 0 0-1.7-1l-.3-2.5h-4l-.3 2.5a7.5 7.5 0 0 0-1.7 1l-2.3-1-2 3.4 2 1.5a7.5 7.5 0 0 0 0 2l-2 1.5 2 3.4 2.3-1a7.5 7.5 0 0 0 1.7 1l.3 2.5h4l.3-2.5a7.5 7.5 0 0 0 1.7-1l2.3 1 2-3.4-2-1.5c.1-.3.1-.7.1-1z"/></svg>
          <span class="lab">Settings</span>
          <svg class="chev" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </div>
        <div class="row">
          <svg class="eq" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M8 13l-1.5 8 5.5-3 5.5 3L16 13"/></svg>
          <span class="lab">Personal records</span>
          <span class="val tab">38</span>
          <svg class="chev" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </div>
        <div class="row">
          <svg class="eq" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M8 11l4 4 4-4"/><path d="M5 19h14"/></svg>
          <span class="lab">Export data</span>
          <svg class="chev" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </div>
        <div class="row">
          <svg class="eq" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 0 1 4.5 1.5c0 1.5-2 2-2 3.5M12 17h.01"/></svg>
          <span class="lab">Help &amp; feedback</span>
          <svg class="chev" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </div>
      </div>

      <div class="signout">Sign out</div>

    </div>

    <div class="tabbar">
      <div class="tabitem">
        <svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="#7A7A7D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 9.5V20h14V9.5"/></svg>
        <div class="tl" style="color:#7A7A7D;">Home</div>
      </div>
      <div class="tabitem">
        <svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="#7A7A7D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
        <div class="tl" style="color:#7A7A7D;">Routines</div>
      </div>
      <div class="tabitem" style="margin-top:-22px;">
        <div class="fab"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="var(--text-on-accent)" stroke-width="2.3" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></div>
        <div class="tl" style="color:var(--accent);margin-top:5px;">Start</div>
      </div>
      <div class="tabitem">
        <svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="#7A7A7D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4v16h16"/><path d="M7 15l3-4 3 2 4-6"/></svg>
        <div class="tl" style="color:#7A7A7D;">Progress</div>
      </div>
      <div class="tabitem">
        <svg viewBox="0 0 24 24" width="23" height="23" fill="var(--accent)"><circle cx="12" cy="8.5" r="3.6"/><path d="M5 20c0-3.6 3.1-6 7-6s7 2.4 7 6z"/></svg>
        <div class="tl" style="color:var(--accent);">Profile</div>
      </div>
    </div>
    <div class="home-ind"></div>
  </div>
</div>
</body>
</html>
