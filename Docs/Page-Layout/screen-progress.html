<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Tracker — Progress</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Archivo:wdth,wght@62..125,100..900&display=swap');
:root{
  --bg:#0A0A0B; --surface:#141416; --raised:#1E1E21; --high:#2E2E33;
  --border-subtle:rgba(255,255,255,0.07); --border-default:rgba(255,255,255,0.10);
  --text-primary:#FFFFFF; --text-secondary:#9A9A9D; --text-tertiary:#6A6A6D;
  --accent:#FF6A28; --accent-text:#FF8A4D; --accent-subtle:rgba(255,106,40,0.14);
  --pr:#A98BFF; --pr-subtle:rgba(169,139,255,0.15); --text-on-accent:#141210;
  --r-xs:4px; --r-sm:8px; --r-md:12px; --r-lg:16px;
  --elev-1:0 6px 20px rgba(0,0,0,0.45);
  --font:'Archivo',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
body{background:#060607;font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 0;}
.exp{font-variation-settings:'wdth' 118,'wght' 800;}
.tab{font-variant-numeric:tabular-nums;}
.cap{font-size:11px;letter-spacing:0.13em;text-transform:uppercase;color:var(--text-secondary);}
.phone{position:relative;width:390px;height:844px;background:var(--bg);border-radius:48px;border:0.5px solid var(--border-subtle);overflow:hidden;box-shadow:0 30px 90px rgba(0,0,0,0.65);color:var(--text-primary);}
.screen{display:flex;flex-direction:column;height:100%;}
.content{flex:1;overflow-y:auto;padding:0 16px 16px;}
.content::-webkit-scrollbar{display:none;}
.statusbar{height:54px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 24px 7px;flex-shrink:0;}
.statusbar .t{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;}
.statusbar .ind{display:flex;align-items:center;gap:6px;}

.navbar{display:flex;align-items:center;padding:4px 0 8px;}
.navbar .ttl{font-size:24px;font-weight:600;}

.range{display:flex;gap:4px;margin-top:10px;}
.range span{font-size:12px;color:var(--text-secondary);padding:6px 13px;border-radius:6px;font-variant-numeric:tabular-nums;}
.range span.on{background:var(--accent);color:var(--text-on-accent);}

.volcard{background:var(--surface);border-radius:var(--r-md);padding:16px;box-shadow:var(--elev-1);margin-top:6px;}
.volcard .big{font-size:30px;margin:5px 0 2px;}
.u{font-size:13px;color:var(--text-secondary);font-variation-settings:normal;font-weight:400;}

.seclabel{margin:24px 0 8px;}

/* exercise gallery row */
.gx{display:flex;align-items:center;gap:14px;padding:14px 4px;border-top:0.5px solid var(--border-subtle);cursor:pointer;}
.gx:first-of-type{border-top:none;}
.gx .info{flex:1;min-width:0;}
.gx .nm{font-size:15px;font-weight:500;color:#EDEDED;}
.gx .v{font-size:13px;color:var(--text-secondary);margin-top:3px;font-variant-numeric:tabular-nums;}
.gx .v b{color:#fff;font-weight:600;}
.gx .v .d{color:var(--accent-text);margin-left:6px;}
.spark{width:74px;height:34px;flex-shrink:0;}
.chev{color:#5A5A5D;flex-shrink:0;}

.tabbar{display:flex;justify-content:space-around;align-items:flex-start;height:84px;padding:11px 8px 0;border-top:0.5px solid var(--border-subtle);background:rgba(10,10,11,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);flex-shrink:0;overflow:visible;}
.tabitem{text-align:center;width:62px;}
.tabitem .tl{font-size:10px;margin-top:4px;}
.fab{width:56px;height:56px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto;box-shadow:0 8px 22px rgba(255,106,40,0.42);}
.home-ind{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:3px;background:rgba(255,255,255,0.22);}
</style>
</head>
<body>
<div class="phone">
  <div class="screen">

    <div class="statusbar">
      <span class="t">9:41</span>
      <span class="ind">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="#fff"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4.5" width="3" height="7.5" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
        <svg width="17" height="12" viewBox="0 0 17 12" fill="none" stroke="#fff" stroke-width="1.4" stroke-linecap="round"><path d="M1 4.2C3.2 2.3 5.7 1.3 8.5 1.3s5.3 1 7.5 2.9"/><path d="M3.4 6.9C4.8 5.7 6.6 5 8.5 5s3.7.7 5.1 1.9"/><path d="M5.9 9.6c.7-.6 1.6-1 2.6-1s1.9.4 2.6 1"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="#fff" stroke-opacity="0.45"/><rect x="2" y="2" width="16.5" height="8" rx="1.6" fill="#fff"/><rect x="23" y="4" width="1.6" height="4" rx="0.8" fill="#fff" fill-opacity="0.45"/></svg>
      </span>
    </div>

    <div class="content">
      <div class="navbar"><div class="ttl">Progress</div></div>

      <!-- TOTAL VOLUME -->
      <div class="cap" style="margin-top:4px;">Total volume · weekly</div>
      <div class="volcard">
        <div class="exp tab big">96,400<span class="u"> lb</span></div>
        <div class="tab" style="font-size:13px;color:var(--accent-text);margin-bottom:8px;">+12% vs last month</div>
        <svg viewBox="0 0 340 120" width="100%" style="height:108px;display:block;">
          <line x1="6" y1="22" x2="340" y2="22" stroke="#FFFFFF" stroke-opacity="0.06"/>
          <line x1="6" y1="64" x2="340" y2="64" stroke="#FFFFFF" stroke-opacity="0.06"/>
          <line x1="6" y1="106" x2="340" y2="106" stroke="#FFFFFF" stroke-opacity="0.06"/>
          <rect x="18" y="70" width="32" height="36" rx="3" fill="#1E1E21"/>
          <rect x="64" y="54" width="32" height="52" rx="3" fill="#1E1E21"/>
          <rect x="110" y="60" width="32" height="46" rx="3" fill="#1E1E21"/>
          <rect x="156" y="40" width="32" height="66" rx="3" fill="#1E1E21"/>
          <rect x="202" y="48" width="32" height="58" rx="3" fill="#1E1E21"/>
          <rect x="248" y="32" width="32" height="74" rx="3" fill="#1E1E21"/>
          <rect x="294" y="20" width="32" height="86" rx="3" fill="#FF6A28"/>
        </svg>
        <div class="range"><span>1M</span><span class="on">3M</span><span>6M</span><span>1Y</span><span>All</span></div>
      </div>

      <!-- PER EXERCISE -->
      <div class="cap seclabel">Your lifts</div>

      <div class="gx">
        <div class="info">
          <div class="nm">Bench press</div>
          <div class="v tab">est. 1RM <b>176 lb</b><span class="d">+26 · 90d</span></div>
        </div>
        <svg class="spark" viewBox="0 0 74 34" fill="none"><polyline stroke="#FF6A28" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" points="2,28 14,29 26,22 38,19 50,20 62,11 72,5"/></svg>
        <svg class="chev" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
      </div>

      <div class="gx">
        <div class="info">
          <div class="nm">Squat</div>
          <div class="v tab">est. 1RM <b>315 lb</b><span class="d">+40 · 90d</span></div>
        </div>
        <svg class="spark" viewBox="0 0 74 34" fill="none"><polyline stroke="#FF6A28" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" points="2,30 14,26 26,24 38,18 50,14 62,10 72,6"/></svg>
        <svg class="chev" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
      </div>

      <div class="gx">
        <div class="info">
          <div class="nm">Deadlift</div>
          <div class="v tab">est. 1RM <b>405 lb</b><span class="d">+35 · 90d</span></div>
        </div>
        <svg class="spark" viewBox="0 0 74 34" fill="none"><polyline stroke="#FF6A28" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" points="2,26 14,24 26,25 38,17 50,16 62,9 72,7"/></svg>
        <svg class="chev" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
      </div>

      <div class="gx">
        <div class="info">
          <div class="nm">Overhead press</div>
          <div class="v tab">est. 1RM <b>115 lb</b><span class="d">+10 · 90d</span></div>
        </div>
        <svg class="spark" viewBox="0 0 74 34" fill="none"><polyline stroke="#FF6A28" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" points="2,24 14,25 26,21 38,22 50,17 62,15 72,12"/></svg>
        <svg class="chev" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
      </div>

    </div>

    <div class="tabbar">
      <div class="tabitem">
        <svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="#7A7A7D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 9.5V20h14V9.5"/></svg>
        <div class="tl" style="color:#7A7A7D;">Home</div>
      </div>
      <div class="tabitem">
        <svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="#7A7A7D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
        <div class="tl" style="color:#7A7A7D;">Routines</div>
      </div>
      <div class="tabitem" style="margin-top:-22px;">
        <div class="fab"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="var(--text-on-accent)" stroke-width="2.3" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></div>
        <div class="tl" style="color:var(--accent);margin-top:5px;">Start</div>
      </div>
      <div class="tabitem">
        <svg viewBox="0 0 24 24" width="23" height="23" fill="var(--accent)"><path d="M4 4v15.5c0 .3.2.5.5.5H20v-2.2H6V4z"/><path d="M8 14.6l3-4 3 2 4-6 1.6 1.2-5 7.4-3-2-2.4 3.2z"/></svg>
        <div class="tl" style="color:var(--accent);">Progress</div>
      </div>
      <div class="tabitem">
        <svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="#7A7A7D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="9" r="3"/><path d="M6 20c0-3.3 2.7-5.5 6-5.5s6 2.2 6 5.5"/></svg>
        <div class="tl" style="color:#7A7A7D;">Profile</div>
      </div>
    </div>
    <div class="home-ind"></div>
  </div>
</div>
</body>
</html>
