<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Tracker — Routine Builder</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Archivo:wdth,wght@62..125,100..900&display=swap');
:root{
  --bg:#0A0A0B; --surface:#141416; --raised:#1E1E21; --high:#2E2E33;
  --border-subtle:rgba(255,255,255,0.07); --border-default:rgba(255,255,255,0.10);
  --text-primary:#FFFFFF; --text-secondary:#9A9A9D; --text-tertiary:#6A6A6D;
  --accent:#FF6A28; --accent-text:#FF8A4D; --accent-subtle:rgba(255,106,40,0.14);
  --destructive:#FF5C5C; --text-on-accent:#141210;
  --r-xs:4px; --r-sm:8px; --r-md:12px; --r-lg:16px;
  --elev-1:0 6px 20px rgba(0,0,0,0.45);
  --font:'Archivo',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
body{background:#060607;font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 0;}
.tab{font-variant-numeric:tabular-nums;}
.cap{font-size:11px;letter-spacing:0.13em;text-transform:uppercase;color:var(--text-secondary);}
.phone{position:relative;width:390px;height:844px;background:var(--bg);border-radius:48px;border:0.5px solid var(--border-subtle);overflow:hidden;box-shadow:0 30px 90px rgba(0,0,0,0.65);color:var(--text-primary);}
.screen{display:flex;flex-direction:column;height:100%;}
.content{flex:1;overflow-y:auto;padding:0 16px 16px;}
.content::-webkit-scrollbar{display:none;}
.statusbar{height:54px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 24px 7px;flex-shrink:0;}
.statusbar .t{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;}
.statusbar .ind{display:flex;align-items:center;gap:6px;}

.navbar{display:flex;align-items:center;justify-content:space-between;padding:4px 4px 12px;flex-shrink:0;}
.navbar .ttl{font-size:16px;font-weight:600;}
.navbar .lft{color:var(--text-secondary);font-size:15px;cursor:pointer;}
.navbar .rgt{color:var(--accent-text);font-size:15px;font-weight:600;cursor:pointer;}

.field-label{font-size:11px;letter-spacing:0.13em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:8px;}
.input{height:48px;background:var(--raised);border:0.5px solid var(--border-default);border-radius:var(--r-sm);padding:0 14px;color:#fff;font-family:var(--font);font-size:16px;width:100%;display:flex;align-items:center;font-weight:500;}

.seclabel{margin:22px 0 12px;}

/* exercise config card */
.excard{background:var(--surface);border-radius:var(--r-md);box-shadow:var(--elev-1);padding:14px 14px 4px;margin-bottom:12px;}
.exhead{display:flex;align-items:center;gap:11px;margin-bottom:12px;}
.exhead .nm{font-size:16px;font-weight:600;flex:1;}
.eq{color:var(--text-secondary);flex-shrink:0;}
.handle{color:#5A5A5D;cursor:grab;flex-shrink:0;}
/* config rows */
.cfg{display:flex;gap:10px;padding-bottom:12px;}
.stepper{flex:1;background:var(--raised);border-radius:var(--r-sm);padding:9px 12px;}
.stepper .lab{font-size:11px;color:var(--text-secondary);}
.stepper .ctrl{display:flex;align-items:center;justify-content:space-between;margin-top:5px;}
.stepper .v{font-size:18px;font-weight:600;font-variant-numeric:tabular-nums;}
.pm{width:26px;height:26px;border-radius:6px;background:var(--high);display:flex;align-items:center;justify-content:center;color:#C9C9CC;cursor:pointer;}
.removerow{display:flex;align-items:center;justify-content:center;gap:7px;color:var(--text-tertiary);font-size:12px;padding:11px 0;border-top:0.5px solid var(--border-subtle);cursor:pointer;}

.btn{font-family:var(--font);font-size:15px;font-weight:600;border:none;border-radius:var(--r-sm);height:50px;width:100%;display:flex;align-items:center;justify-content:center;gap:9px;cursor:pointer;}
.btn-secondary{background:var(--raised);color:#EDEDED;}
.btn-primary{background:var(--accent);color:var(--text-on-accent);}

.footer{padding:12px 16px calc(12px + env(safe-area-inset-bottom));border-top:0.5px solid var(--border-subtle);background:var(--bg);flex-shrink:0;}
.home-ind{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:3px;background:rgba(255,255,255,0.22);}
</style>
</head>
<body>
<div class="phone">
  <div class="screen">

    <div class="statusbar">
      <span class="t">9:41</span>
      <span class="ind">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="#fff"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4.5" width="3" height="7.5" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
        <svg width="17" height="12" viewBox="0 0 17 12" fill="none" stroke="#fff" stroke-width="1.4" stroke-linecap="round"><path d="M1 4.2C3.2 2.3 5.7 1.3 8.5 1.3s5.3 1 7.5 2.9"/><path d="M3.4 6.9C4.8 5.7 6.6 5 8.5 5s3.7.7 5.1 1.9"/><path d="M5.9 9.6c.7-.6 1.6-1 2.6-1s1.9.4 2.6 1"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="#fff" stroke-opacity="0.45"/><rect x="2" y="2" width="16.5" height="8" rx="1.6" fill="#fff"/><rect x="23" y="4" width="1.6" height="4" rx="0.8" fill="#fff" fill-opacity="0.45"/></svg>
      </span>
    </div>

    <div class="navbar">
      <span class="lft">Cancel</span>
      <span class="ttl">Edit routine</span>
      <span class="rgt">Save</span>
    </div>

    <div class="content">

      <div class="field-label">Routine name</div>
      <div class="input">Push day</div>

      <div class="cap seclabel">Exercises · 3</div>

      <!-- EX 1 -->
      <div class="excard">
        <div class="exhead">
          <svg class="eq" viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h2M20 12h2M5 9v6M7 10.5v3M17 10.5v3M19 9v6M7 12h10"/></svg>
          <span class="nm">Barbell bench press</span>
          <svg class="handle" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M8 7h8M8 12h8M8 17h8"/></svg>
        </div>
        <div class="cfg">
          <div class="stepper"><div class="lab">Sets</div><div class="ctrl"><span class="pm">−</span><span class="v">4</span><span class="pm">+</span></div></div>
          <div class="stepper"><div class="lab">Target reps</div><div class="ctrl"><span class="pm">−</span><span class="v">8</span><span class="pm">+</span></div></div>
        </div>
        <div class="removerow"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M5 12h14"/></svg>Remove</div>
      </div>

      <!-- EX 2 -->
      <div class="excard">
        <div class="exhead">
          <svg class="eq" viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 7v10M9.5 8.5v7M14.5 8.5v7M17.5 7v10M9.5 12h5"/></svg>
          <span class="nm">Incline dumbbell press</span>
          <svg class="handle" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M8 7h8M8 12h8M8 17h8"/></svg>
        </div>
        <div class="cfg">
          <div class="stepper"><div class="lab">Sets</div><div class="ctrl"><span class="pm">−</span><span class="v">3</span><span class="pm">+</span></div></div>
          <div class="stepper"><div class="lab">Target reps</div><div class="ctrl"><span class="pm">−</span><span class="v">10</span><span class="pm">+</span></div></div>
        </div>
        <div class="removerow"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M5 12h14"/></svg>Remove</div>
      </div>

      <!-- EX 3 -->
      <div class="excard">
        <div class="exhead">
          <svg class="eq" viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="2.2"/><path d="M12 7.2v5l-4 7M12 12.2l4 7"/></svg>
          <span class="nm">Cable fly</span>
          <svg class="handle" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M8 7h8M8 12h8M8 17h8"/></svg>
        </div>
        <div class="cfg">
          <div class="stepper"><div class="lab">Sets</div><div class="ctrl"><span class="pm">−</span><span class="v">3</span><span class="pm">+</span></div></div>
          <div class="stepper"><div class="lab">Target reps</div><div class="ctrl"><span class="pm">−</span><span class="v">12</span><span class="pm">+</span></div></div>
        </div>
        <div class="removerow"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M5 12h14"/></svg>Remove</div>
      </div>

      <button class="btn btn-secondary">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#EDEDED" stroke-width="1.8" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>Add exercise
      </button>

    </div>

    <div class="footer">
      <button class="btn btn-primary">Save routine</button>
    </div>
    <div class="home-ind"></div>
  </div>
</div>
</body>
</html>
