<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Tracker — Routines</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Archivo:wdth,wght@62..125,100..900&display=swap');
:root{
  --bg:#0A0A0B; --surface:#141416; --raised:#1E1E21; --high:#2E2E33;
  --border-subtle:rgba(255,255,255,0.07); --border-default:rgba(255,255,255,0.10);
  --text-primary:#FFFFFF; --text-secondary:#9A9A9D; --text-tertiary:#6A6A6D;
  --accent:#FF6A28; --accent-text:#FF8A4D; --accent-subtle:rgba(255,106,40,0.14); --accent-border:rgba(255,106,40,0.40);
  --text-on-accent:#141210;
  --r-xs:4px; --r-sm:8px; --r-md:12px; --r-lg:16px;
  --elev-1:0 6px 20px rgba(0,0,0,0.45); --elev-2:0 8px 24px rgba(0,0,0,0.50);
  --font:'Archivo',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
body{background:#060607;font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 0;}
.exp{font-variation-settings:'wdth' 118,'wght' 800;}
.tab{font-variant-numeric:tabular-nums;}
.cap{font-size:11px;letter-spacing:0.13em;text-transform:uppercase;color:var(--text-secondary);}
.phone{position:relative;width:390px;height:844px;background:var(--bg);border-radius:48px;border:0.5px solid var(--border-subtle);overflow:hidden;box-shadow:0 30px 90px rgba(0,0,0,0.65);color:var(--text-primary);}
.screen{display:flex;flex-direction:column;height:100%;}
.content{flex:1;overflow-y:auto;padding:0 16px 16px;}
.content::-webkit-scrollbar{display:none;}
.statusbar{height:54px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 24px 7px;flex-shrink:0;}
.statusbar .t{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;}
.statusbar .ind{display:flex;align-items:center;gap:6px;}

.navbar{display:flex;align-items:center;justify-content:space-between;padding:4px 0 10px;}
.navbar .ttl{font-size:24px;font-weight:600;}
.iconbtn{width:40px;height:40px;border-radius:var(--r-sm);background:var(--raised);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;color:#E6E6E6;}

.seclabel{margin:22px 0 10px;}
.seclabel:first-of-type{margin-top:8px;}

/* routine folder card */
.folder{background:var(--surface);border-radius:var(--r-md);box-shadow:var(--elev-1);overflow:hidden;}
.folder .fhead{display:flex;align-items:center;gap:11px;padding:15px 16px 13px;}
.folder .fname{font-size:17px;font-weight:600;}
.folder .fmeta{font-size:12px;color:var(--text-secondary);margin-top:1px;}
.dayrow{display:flex;align-items:center;gap:12px;padding:13px 16px;border-top:0.5px solid var(--border-subtle);cursor:pointer;}
.dayrow .dn{flex:1;font-size:15px;font-weight:500;color:#EDEDED;}
.dayrow .dm{font-size:12px;color:var(--text-secondary);}
.play{width:34px;height:34px;border-radius:50%;background:var(--accent-subtle);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.eq{color:var(--text-secondary);flex-shrink:0;}

/* new routine ghost */
.newrow{display:flex;align-items:center;justify-content:center;gap:8px;height:50px;border:1px dashed rgba(255,255,255,0.14);border-radius:var(--r-sm);color:var(--accent-text);font-size:15px;font-weight:500;margin-top:12px;cursor:pointer;}

/* template list rows */
.trow{display:flex;align-items:center;gap:13px;padding:14px 4px;border-top:0.5px solid var(--border-subtle);}
.trow:first-of-type{border-top:none;}
.trow .info{flex:1;}
.trow .tn{font-size:15px;font-weight:500;color:#EDEDED;}
.trow .ts{font-size:12px;color:var(--text-secondary);margin-top:2px;}
.addbtn{width:30px;height:30px;border-radius:50%;border:1.5px solid #3A3A3E;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);flex-shrink:0;cursor:pointer;}

.tabbar{display:flex;justify-content:space-around;align-items:flex-start;height:84px;padding:11px 8px 0;border-top:0.5px solid var(--border-subtle);background:rgba(10,10,11,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);flex-shrink:0;overflow:visible;}
.tabitem{text-align:center;width:62px;}
.tabitem .tl{font-size:10px;margin-top:4px;}
.fab{width:56px;height:56px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto;box-shadow:0 8px 22px rgba(255,106,40,0.42);}
.home-ind{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:3px;background:rgba(255,255,255,0.22);}
</style>
</head>
<body>
<div class="phone">
  <div class="screen">

    <div class="statusbar">
      <span class="t">9:41</span>
      <span class="ind">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="#fff"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4.5" width="3" height="7.5" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
        <svg width="17" height="12" viewBox="0 0 17 12" fill="none" stroke="#fff" stroke-width="1.4" stroke-linecap="round"><path d="M1 4.2C3.2 2.3 5.7 1.3 8.5 1.3s5.3 1 7.5 2.9"/><path d="M3.4 6.9C4.8 5.7 6.6 5 8.5 5s3.7.7 5.1 1.9"/><path d="M5.9 9.6c.7-.6 1.6-1 2.6-1s1.9.4 2.6 1"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="#fff" stroke-opacity="0.45"/><rect x="2" y="2" width="16.5" height="8" rx="1.6" fill="#fff"/><rect x="23" y="4" width="1.6" height="4" rx="0.8" fill="#fff" fill-opacity="0.45"/></svg>
      </span>
    </div>

    <div class="content">
      <div class="navbar">
        <div class="ttl">Routines</div>
        <button class="iconbtn"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#E6E6E6" stroke-width="1.8" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>
      </div>

      <!-- YOUR ROUTINES -->
      <div class="cap seclabel">Your routines</div>
      <div class="folder">
        <div class="fhead">
          <svg class="eq" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
          <div><div class="fname">Push Pull Legs</div><div class="fmeta">3 days · 17 exercises</div></div>
        </div>
        <div class="dayrow">
          <div class="dn">Push day</div><span class="dm tab">6 exercises</span>
          <span class="play"><svg viewBox="0 0 24 24" width="15" height="15" fill="var(--accent)"><path d="M8 5v14l11-7z"/></svg></span>
        </div>
        <div class="dayrow">
          <div class="dn">Pull day</div><span class="dm tab">6 exercises</span>
          <span class="play"><svg viewBox="0 0 24 24" width="15" height="15" fill="var(--accent)"><path d="M8 5v14l11-7z"/></svg></span>
        </div>
        <div class="dayrow">
          <div class="dn">Leg day</div><span class="dm tab">5 exercises</span>
          <span class="play"><svg viewBox="0 0 24 24" width="15" height="15" fill="var(--accent)"><path d="M8 5v14l11-7z"/></svg></span>
        </div>
      </div>

      <div class="newrow">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>New routine
      </div>

      <!-- TEMPLATES -->
      <div class="cap seclabel">Start from a template</div>
      <div style="background:var(--surface);border-radius:var(--r-md);padding:4px 16px;box-shadow:var(--elev-1);">
        <div class="trow">
          <svg class="eq" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h2M20 12h2M5 9v6M7 10.5v3M17 10.5v3M19 9v6M7 12h10"/></svg>
          <div class="info"><div class="tn">Full Body</div><div class="ts">3 days/week · beginner</div></div>
          <span class="addbtn"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></span>
        </div>
        <div class="trow">
          <svg class="eq" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 7v10M9.5 8.5v7M14.5 8.5v7M17.5 7v10M9.5 12h5"/></svg>
          <div class="info"><div class="tn">Upper / Lower</div><div class="ts">4 days/week · intermediate</div></div>
          <span class="addbtn"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></span>
        </div>
      </div>

    </div>

    <div class="tabbar">
      <div class="tabitem">
        <svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="#7A7A7D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 9.5V20h14V9.5"/></svg>
        <div class="tl" style="color:#7A7A7D;">Home</div>
      </div>
      <div class="tabitem">
        <svg viewBox="0 0 24 24" width="23" height="23" fill="var(--accent)"><path d="M4 5h16v2.4H4zM4 10.8h16v2.4H4zM4 16.6h10v2.4H4z"/></svg>
        <div class="tl" style="color:var(--accent);">Routines</div>
      </div>
      <div class="tabitem" style="margin-top:-22px;">
        <div class="fab"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="var(--text-on-accent)" stroke-width="2.3" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></div>
        <div class="tl" style="color:var(--accent);margin-top:5px;">Start</div>
      </div>
      <div class="tabitem">
        <svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="#7A7A7D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4v16h16"/><path d="M7 15l3-4 3 2 4-6"/></svg>
        <div class="tl" style="color:#7A7A7D;">Progress</div>
      </div>
      <div class="tabitem">
        <svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="#7A7A7D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="9" r="3"/><path d="M6 20c0-3.3 2.7-5.5 6-5.5s6 2.2 6 5.5"/></svg>
        <div class="tl" style="color:#7A7A7D;">Profile</div>
      </div>
    </div>
    <div class="home-ind"></div>
  </div>
</div>
</body>
</html>
