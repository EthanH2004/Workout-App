<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Tracker — Number Pad</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Archivo:wdth,wght@62..125,100..900&display=swap');
:root{
  --bg:#0A0A0B; --surface:#141416; --raised:#1E1E21; --overlay:#26262A; --high:#2E2E33;
  --border-subtle:rgba(255,255,255,0.07); --border-default:rgba(255,255,255,0.10);
  --text-primary:#FFFFFF; --text-secondary:#9A9A9D; --text-tertiary:#6A6A6D;
  --accent:#FF6A28; --accent-text:#FF8A4D; --accent-subtle:rgba(255,106,40,0.14);
  --pr:#A98BFF; --pr-subtle:rgba(169,139,255,0.15); --text-on-accent:#141210; --ghost:#838388;
  --r-xs:4px; --r-sm:8px; --r-md:12px; --r-lg:16px;
  --elev-2:0 8px 24px rgba(0,0,0,0.50); --elev-3:0 -12px 36px rgba(0,0,0,0.60);
  --font:'Archivo',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
body{background:#060607;font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 0;}
.exp{font-variation-settings:'wdth' 118,'wght' 800;}
.tab{font-variant-numeric:tabular-nums;}
.cap{font-size:11px;letter-spacing:0.13em;text-transform:uppercase;color:var(--text-secondary);}
.phone{position:relative;width:390px;height:844px;background:var(--bg);border-radius:48px;border:0.5px solid var(--border-subtle);overflow:hidden;box-shadow:0 30px 90px rgba(0,0,0,0.65);color:var(--text-primary);}
.statusbar{height:54px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 24px 7px;}
.statusbar .t{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;}
.statusbar .ind{display:flex;align-items:center;gap:6px;}

/* dimmed workout behind */
.behind{padding:0 16px;filter:saturate(0.9);}
.navbar{display:flex;align-items:center;justify-content:space-between;padding:2px 0 12px;}
.navbar .ttl{font-size:16px;font-weight:600;}
.timer{display:flex;align-items:center;gap:5px;color:var(--accent-text);font-size:14px;font-variant-numeric:tabular-nums;}
.exhead{display:flex;align-items:center;gap:10px;margin-bottom:3px;}
.exhead .nm{font-size:17px;font-weight:600;}
.pr-chip{font-size:11px;color:var(--pr);background:var(--pr-subtle);padding:3px 9px;border-radius:var(--r-xs);margin-left:auto;}
.lasttime{font-size:12px;color:var(--text-tertiary);margin-bottom:12px;}
.colhead{display:grid;grid-template-columns:46px 1fr 1fr 44px;gap:8px;padding:0 6px 7px;}
.colhead span{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-tertiary);text-align:center;}
.colhead span:first-child{text-align:left;}
.setrow{display:grid;grid-template-columns:46px 1fr 1fr 44px;align-items:center;gap:8px;padding:11px 6px;border-top:0.5px solid var(--border-subtle);}
.setrow .sl{font-size:13px;color:var(--text-secondary);}
.setrow .val{font-size:16px;font-weight:500;text-align:center;font-variant-numeric:tabular-nums;}
.setrow .ghost{color:var(--ghost);font-weight:400;}
.setrow.editing{background:var(--accent-subtle);border-radius:var(--r-sm);border-top:0.5px solid transparent;}
.check{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto;}
.check.done{background:var(--accent);}
.check.todo{border:1.5px solid #3A3A3E;}

/* scrim */
.scrim{position:absolute;inset:0;background:rgba(0,0,0,0.55);}

/* number pad sheet */
.sheet{position:absolute;left:0;right:0;bottom:0;background:var(--overlay);border-top:0.5px solid rgba(255,255,255,0.07);
  border-radius:var(--r-lg) var(--r-lg) 0 0;padding:10px 16px 30px;box-shadow:var(--elev-3);}
.grabber{width:36px;height:4px;border-radius:2px;background:#3A3A3E;margin:0 auto 16px;}
.fields{display:flex;align-items:flex-end;justify-content:center;gap:22px;margin-bottom:16px;}
.field{text-align:center;}
.field .field-label{font-size:11px;letter-spacing:0.13em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:4px;}
.field .box{padding-bottom:3px;}
.field .num{font-size:46px;font-variation-settings:'wdth' 118,'wght' 800;font-variant-numeric:tabular-nums;line-height:0.95;}
.field .u{font-size:14px;color:var(--text-secondary);}
.field.on .box{border-bottom:2px solid var(--accent);}
.field.off .box{border-bottom:2px solid var(--high);}
.mul{font-size:22px;color:#5A5A5D;padding-bottom:12px;}
.plates{display:flex;justify-content:center;gap:8px;margin-bottom:14px;}
.chip-pill{font-size:13px;color:#C9C9CC;background:var(--high);border-radius:999px;padding:8px 16px;font-variant-numeric:tabular-nums;cursor:pointer;}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:12px;}
.key{font-family:var(--font);font-size:25px;color:#fff;text-align:center;padding:13px 0;border-radius:var(--r-sm);font-variant-numeric:tabular-nums;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.key:active{background:var(--high);}
.btn-log{background:var(--accent);color:var(--text-on-accent);height:52px;border-radius:var(--r-sm);font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:9px;cursor:pointer;}
.home-ind{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:3px;background:rgba(255,255,255,0.22);}
</style>
</head>
<body>
<div class="phone">

  <div class="statusbar">
    <span class="t">9:41</span>
    <span class="ind">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="#fff"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4.5" width="3" height="7.5" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none" stroke="#fff" stroke-width="1.4" stroke-linecap="round"><path d="M1 4.2C3.2 2.3 5.7 1.3 8.5 1.3s5.3 1 7.5 2.9"/><path d="M3.4 6.9C4.8 5.7 6.6 5 8.5 5s3.7.7 5.1 1.9"/><path d="M5.9 9.6c.7-.6 1.6-1 2.6-1s1.9.4 2.6 1"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="#fff" stroke-opacity="0.45"/><rect x="2" y="2" width="16.5" height="8" rx="1.6" fill="#fff"/><rect x="23" y="4" width="1.6" height="4" rx="0.8" fill="#fff" fill-opacity="0.45"/></svg>
    </span>
  </div>

  <!-- dimmed workout behind -->
  <div class="behind">
    <div class="navbar">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#E6E6E6" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      <div class="ttl">Push day</div>
      <div class="timer"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><path d="M12 8v4l2.5 2"/></svg>12:18</div>
    </div>
    <div style="background:var(--raised);border-radius:var(--r-md);padding:16px;box-shadow:var(--elev-2);">
      <div class="exhead">
        <svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="#9A9A9D" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h2M20 12h2M5 9v6M7 10.5v3M17 10.5v3M19 9v6M7 12h10"/></svg>
        <span class="nm">Barbell bench press</span><span class="pr-chip">PR</span>
      </div>
      <div class="lasttime tab">Last time · Jun 1 · 135 × 8</div>
      <div class="colhead"><span>Set</span><span>Lbs</span><span>Reps</span><span></span></div>
      <div class="setrow"><span class="sl">1</span><span class="val">135</span><span class="val">8</span><span class="check done"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#141210" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L19 7"/></svg></span></div>
      <div class="setrow"><span class="sl">2</span><span class="val">135</span><span class="val">8</span><span class="check done"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#141210" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L19 7"/></svg></span></div>
      <div class="setrow editing"><span class="sl">3</span><span class="val tab">135</span><span class="val tab">8</span><span class="check todo"></span></div>
    </div>
  </div>

  <div class="scrim"></div>

  <!-- NUMBER PAD -->
  <div class="sheet">
    <div class="grabber"></div>
    <div class="fields">
      <div class="field on">
        <div class="field-label">Weight</div>
        <div class="box"><span class="num">135</span><span class="u"> lb</span></div>
      </div>
      <div class="mul">×</div>
      <div class="field off">
        <div class="field-label">Reps</div>
        <div class="box"><span class="num">8</span></div>
      </div>
    </div>
    <div class="plates">
      <span class="chip-pill">+2.5</span><span class="chip-pill">+5</span><span class="chip-pill">+10</span><span class="chip-pill">+25</span>
    </div>
    <div class="keypad">
      <div class="key">1</div><div class="key">2</div><div class="key">3</div>
      <div class="key">4</div><div class="key">5</div><div class="key">6</div>
      <div class="key">7</div><div class="key">8</div><div class="key">9</div>
      <div class="key">.</div><div class="key">0</div>
      <div class="key"><svg viewBox="0 0 24 24" width="25" height="25" fill="none" stroke="#C9C9CC" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M10 5h9a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-9l-7-7z"/><path d="M14 9l-4 6M10 9l4 6"/></svg></div>
    </div>
    <div class="btn-log">
      <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="#141210" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L19 7"/></svg>Log &amp; next set
    </div>
  </div>

  <div class="home-ind"></div>
</div>
</body>
</html>
