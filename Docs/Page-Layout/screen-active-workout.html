<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Tracker — Active Workout</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Archivo:wdth,wght@62..125,100..900&display=swap');
:root{
  --bg:#0A0A0B; --surface:#141416; --raised:#1E1E21; --overlay:#26262A; --high:#2E2E33;
  --border-subtle:rgba(255,255,255,0.07); --border-default:rgba(255,255,255,0.10); --border-strong:rgba(255,255,255,0.16);
  --text-primary:#FFFFFF; --text-secondary:#9A9A9D; --text-tertiary:#6A6A6D; --text-disabled:#4A4A4D;
  --accent:#FF6A28; --accent-pressed:#E0561C; --accent-text:#FF8A4D; --accent-subtle:rgba(255,106,40,0.14); --accent-border:rgba(255,106,40,0.40);
  --success:#3DDC84; --destructive:#FF5C5C; --pr:#A98BFF; --pr-subtle:rgba(169,139,255,0.15);
  --text-on-accent:#141210; --ghost:#838388;
  --r-xs:4px; --r-sm:8px; --r-md:12px; --r-lg:16px;
  --elev-1:0 6px 20px rgba(0,0,0,0.45); --elev-2:0 8px 24px rgba(0,0,0,0.50);
  --font:'Archivo',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
body{background:#060607;font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 0;}
.exp{font-variation-settings:'wdth' 118,'wght' 800;}
.tab{font-variant-numeric:tabular-nums;}
.cap{font-size:11px;letter-spacing:0.13em;text-transform:uppercase;color:var(--text-secondary);}
.phone{position:relative;width:390px;height:844px;background:var(--bg);border-radius:48px;border:0.5px solid var(--border-subtle);overflow:hidden;box-shadow:0 30px 90px rgba(0,0,0,0.65);color:var(--text-primary);}
.screen{display:flex;flex-direction:column;height:100%;}
.content{flex:1;overflow-y:auto;padding:0 16px 28px;}
.content::-webkit-scrollbar{display:none;}
.statusbar{height:54px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 24px 7px;flex-shrink:0;}
.statusbar .t{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:0.02em;}
.statusbar .ind{display:flex;align-items:center;gap:6px;}
.btn{font-family:var(--font);font-size:15px;font-weight:600;border:none;border-radius:var(--r-sm);height:50px;width:100%;display:flex;align-items:center;justify-content:center;gap:9px;cursor:pointer;transition:transform 130ms cubic-bezier(.2,0,0,1),filter 130ms;}
.btn:active{transform:scale(0.97);filter:brightness(0.92);}
.btn-primary{background:var(--accent);color:var(--text-on-accent);}
.btn-secondary{background:var(--raised);color:#EDEDED;}

/* nav header */
.navbar{display:flex;align-items:center;justify-content:space-between;padding:2px 14px 12px;flex-shrink:0;}
.navbar .center{text-align:center;}
.navbar .ttl{font-size:16px;font-weight:600;}
.navbar .sub{font-size:11px;color:var(--text-tertiary);margin-top:1px;}
.timer{display:flex;align-items:center;gap:5px;color:var(--accent-text);}
.timer .tv{font-size:14px;font-variant-numeric:tabular-nums;font-weight:500;}
.iconbtn{width:38px;height:38px;border-radius:var(--r-sm);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;color:#E6E6E6;}

/* exercise card */
.exhead{display:flex;align-items:center;gap:10px;margin-bottom:3px;}
.exhead .nm{font-size:17px;font-weight:600;}
.exhead .pr-chip{font-size:11px;color:var(--pr);background:var(--pr-subtle);padding:3px 9px;border-radius:var(--r-xs);letter-spacing:0.05em;margin-left:auto;}
.eq{color:var(--text-secondary);flex-shrink:0;}
.lasttime{font-size:12px;color:var(--text-tertiary);margin-bottom:12px;}

.colhead{display:grid;grid-template-columns:46px 1fr 1fr 44px;gap:8px;padding:0 6px 7px;}
.colhead span{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-tertiary);text-align:center;}
.colhead span:first-child{text-align:left;}
.setrow{display:grid;grid-template-columns:46px 1fr 1fr 44px;align-items:center;gap:8px;padding:11px 6px;border-top:0.5px solid var(--border-subtle);}
.setrow .sl{font-size:13px;color:var(--text-secondary);font-variant-numeric:tabular-nums;}
.setrow .val{font-size:16px;font-weight:500;color:#fff;text-align:center;font-variant-numeric:tabular-nums;}
.setrow .ghost{color:var(--ghost);font-weight:400;}
.setrow.active{background:var(--accent-subtle);border-radius:var(--r-sm);border-top:0.5px solid transparent;}
.check{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto;cursor:pointer;}
.check.done{background:var(--accent);}
.check.todo{border:1.5px solid #3A3A3E;}
.addset{display:flex;align-items:center;justify-content:center;gap:7px;color:var(--accent-text);font-size:13px;font-weight:500;padding:13px 0 3px;border-top:0.5px solid var(--border-subtle);margin-top:2px;cursor:pointer;}

.home-ind{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:3px;background:rgba(255,255,255,0.22);}
</style>
</head>
<body>
<div class="phone">
  <div class="screen">

    <div class="statusbar">
      <span class="t">9:41</span>
      <span class="ind">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="#fff"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4.5" width="3" height="7.5" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
        <svg width="17" height="12" viewBox="0 0 17 12" fill="none" stroke="#fff" stroke-width="1.4" stroke-linecap="round"><path d="M1 4.2C3.2 2.3 5.7 1.3 8.5 1.3s5.3 1 7.5 2.9"/><path d="M3.4 6.9C4.8 5.7 6.6 5 8.5 5s3.7.7 5.1 1.9"/><path d="M5.9 9.6c.7-.6 1.6-1 2.6-1s1.9.4 2.6 1"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="#fff" stroke-opacity="0.45"/><rect x="2" y="2" width="16.5" height="8" rx="1.6" fill="#fff"/><rect x="23" y="4" width="1.6" height="4" rx="0.8" fill="#fff" fill-opacity="0.45"/></svg>
      </span>
    </div>

    <!-- NAV -->
    <div class="navbar">
      <button class="iconbtn"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#E6E6E6" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></button>
      <div class="center"><div class="ttl">Push day</div><div class="sub">Push Pull Legs</div></div>
      <div class="timer"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><path d="M12 8v4l2.5 2"/></svg><span class="tv">12:04</span></div>
    </div>

    <div class="content">

      <!-- EXERCISE 1 — active -->
      <div class="card raised" style="background:var(--raised);border-radius:var(--r-md);padding:16px;box-shadow:var(--elev-2);">
        <div class="exhead">
          <svg class="eq" viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h2M20 12h2M5 9v6M7 10.5v3M17 10.5v3M19 9v6M7 12h10"/></svg>
          <span class="nm">Barbell bench press</span>
          <span class="pr-chip">PR</span>
        </div>
        <div class="lasttime tab">Last time · Jun 1 · 135 × 8</div>
        <div class="colhead"><span>Set</span><span>Lbs</span><span>Reps</span><span></span></div>
        <div class="setrow"><span class="sl">1</span><span class="val">135</span><span class="val">8</span><span class="check done"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#141210" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L19 7"/></svg></span></div>
        <div class="setrow"><span class="sl">2</span><span class="val">135</span><span class="val">8</span><span class="check done"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#141210" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L19 7"/></svg></span></div>
        <div class="setrow active"><span class="sl">3</span><span class="val ghost">135</span><span class="val ghost">8</span><span class="check todo"></span></div>
        <div class="setrow"><span class="sl">4</span><span class="val ghost">135</span><span class="val ghost">8</span><span class="check todo"></span></div>
        <div class="addset"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>Add set</div>
      </div>

      <!-- EXERCISE 2 — resting -->
      <div style="background:var(--surface);border-radius:var(--r-md);padding:16px;box-shadow:var(--elev-1);margin-top:14px;">
        <div class="exhead">
          <svg class="eq" viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 7v10M9.5 8.5v7M14.5 8.5v7M17.5 7v10M9.5 12h5"/></svg>
          <span class="nm">Incline dumbbell press</span>
        </div>
        <div class="lasttime tab">Last time · Jun 1 · 60 × 10</div>
        <div class="colhead"><span>Set</span><span>Lbs</span><span>Reps</span><span></span></div>
        <div class="setrow"><span class="sl">1</span><span class="val ghost">60</span><span class="val ghost">10</span><span class="check todo"></span></div>
        <div class="setrow"><span class="sl">2</span><span class="val ghost">60</span><span class="val ghost">10</span><span class="check todo"></span></div>
        <div class="setrow"><span class="sl">3</span><span class="val ghost">60</span><span class="val ghost">10</span><span class="check todo"></span></div>
        <div class="addset"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>Add set</div>
      </div>

      <!-- EXERCISE 3 — resting -->
      <div style="background:var(--surface);border-radius:var(--r-md);padding:16px;box-shadow:var(--elev-1);margin-top:14px;">
        <div class="exhead">
          <svg class="eq" viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 7v10M9.5 8.5v7M14.5 8.5v7M17.5 7v10M9.5 12h5"/></svg>
          <span class="nm">Seated shoulder press</span>
        </div>
        <div class="lasttime tab">Last time · May 28 · 45 × 10</div>
        <div class="colhead"><span>Set</span><span>Lbs</span><span>Reps</span><span></span></div>
        <div class="setrow"><span class="sl">1</span><span class="val ghost">45</span><span class="val ghost">10</span><span class="check todo"></span></div>
        <div class="setrow"><span class="sl">2</span><span class="val ghost">45</span><span class="val ghost">10</span><span class="check todo"></span></div>
        <div class="addset"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>Add set</div>
      </div>

      <button class="btn btn-secondary" style="margin-top:16px;">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#EDEDED" stroke-width="1.8" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>Add exercise
      </button>
      <button class="btn btn-primary" style="margin-top:10px;">Finish workout</button>

    </div>
    <div class="home-ind"></div>
  </div>
</div>
</body>
</html>
